<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jumpstart Deck Browser</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c16; --bg2:#141428; --bg3:#1c1c38; --bg4:#22224a;
  --gold:#c9a84c; --gold-dim:#7a6028; --gold-glow:rgba(201,168,76,0.15);
  --text:#e2ddd4; --text2:#9e9ab0; --border:rgba(201,168,76,0.18); --border-hover:rgba(201,168,76,0.5);
  --mana-w:#f5f0d4; --mana-u:#3b82c4; --mana-b:#9b6ac7; --mana-r:#d44c3c; --mana-g:#4ab870; --mana-multi:#c9a84c;
  --own-color:#5cb85c; --own-glow:rgba(92,184,92,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;font-size:17px;line-height:1.5;min-height:100vh}

/* ── Header ── */
.site-header{background:linear-gradient(180deg,#08081a 0%,var(--bg) 100%);border-bottom:1px solid var(--border);padding:1.25rem 1.25rem 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-top{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.site-logo{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold);letter-spacing:.04em;text-shadow:0 0 20px rgba(201,168,76,.3)}
.site-logo span{color:var(--text2);font-weight:400}
.header-right{margin-left:auto;display:flex;align-items:center;gap:.6rem}
.search-wrap{position:relative}
.search-wrap input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Crimson Pro',serif;font-size:1rem;padding:.4rem .8rem .4rem 2rem;width:200px;transition:border-color .2s,width .3s;outline:none}
.search-wrap input:focus{border-color:var(--gold);width:260px}
.search-wrap input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:.6rem;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none;font-size:.9rem}
.search-mode-badge{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);font-size:.62rem;padding:.1rem .35rem;border-radius:4px;font-family:'Cinzel',serif;letter-spacing:.04em;pointer-events:none;background:var(--bg4);color:var(--gold)}

/* owned-only button */
.owned-btn{align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;display:flex;font-family:'Cinzel',serif;font-size:.72rem;font-weight:600;gap:.35rem;letter-spacing:.04em;padding:.4rem .8rem;transition:all .2s;white-space:nowrap}
.owned-btn:hover{border-color:var(--own-color);color:var(--text)}
.owned-btn.active{background:var(--own-glow);border-color:var(--own-color);color:var(--own-color)}
.owned-btn .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}

/* tabs */
.edition-tabs{display:flex;gap:.15rem;overflow-x:auto;scrollbar-width:none;padding-bottom:0}
.edition-tabs::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-family:'Cinzel',serif;font-size:.76rem;font-weight:600;letter-spacing:.05em;padding:.55rem .9rem;white-space:nowrap;transition:color .2s,border-color .2s;text-transform:uppercase}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── Filter bar ── */
.filter-bar{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.45rem;padding:.55rem 1.25rem;flex-wrap:wrap}
.filter-label{color:var(--text2);font-size:.78rem;font-family:'Cinzel',serif;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.color-btn{align-items:center;border:1.5px solid transparent;border-radius:20px;cursor:pointer;display:inline-flex;font-family:'Cinzel',serif;font-size:.7rem;font-weight:600;gap:.3rem;letter-spacing:.04em;padding:.25rem .65rem;transition:all .15s;white-space:nowrap}
.color-btn .pip{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.color-btn.all{background:var(--bg3);border-color:var(--border-hover);color:var(--text)}
.color-btn.all.active{background:var(--gold);border-color:var(--gold);color:#1a1000}
.color-btn[data-c="W"]{background:rgba(245,240,212,.1);color:#c5b87a}
.color-btn[data-c="W"].active{border-color:var(--mana-w)}
.color-btn[data-c="U"]{background:rgba(59,130,196,.12);color:#7ab4e8}
.color-btn[data-c="U"].active{border-color:var(--mana-u)}
.color-btn[data-c="B"]{background:rgba(155,106,199,.12);color:#b090e0}
.color-btn[data-c="B"].active{border-color:var(--mana-b)}
.color-btn[data-c="R"]{background:rgba(212,76,60,.12);color:#e88070}
.color-btn[data-c="R"].active{border-color:var(--mana-r)}
.color-btn[data-c="G"]{background:rgba(74,184,112,.12);color:#70d890}
.color-btn[data-c="G"].active{border-color:var(--mana-g)}
.color-btn[data-c="M"]{background:rgba(201,168,76,.1);color:#d4b870}
.color-btn[data-c="M"].active{border-color:var(--mana-multi)}
.results-count{margin-left:auto;color:var(--text2);font-size:.8rem;white-space:nowrap;font-family:'Crimson Pro',serif}

/* ── Grid ── */
main{padding:1.5rem 1.25rem;max-width:1400px;margin:0 auto}
.edition-section{margin-bottom:2.5rem}
.edition-heading{font-family:'Cinzel',serif;font-size:1rem;font-weight:600;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.9rem;display:flex;align-items:center;gap:.65rem}
.edition-heading::after{content:'';flex:1;height:1px;background:var(--border)}
.deck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.75rem}

/* ── Deck card ── */
.deck-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;padding:.9rem 1rem;transition:border-color .2s,background .2s,transform .15s;position:relative;overflow:hidden;text-align:left;width:100%}
.deck-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.04) 0%,transparent 60%);pointer-events:none;opacity:0;transition:opacity .2s}
.deck-card:hover{border-color:var(--border-hover);background:var(--bg3);transform:translateY(-2px)}
.deck-card:hover::before{opacity:1}
.deck-card.owned-card{border-color:rgba(92,184,92,.35);box-shadow:0 0 0 1px rgba(92,184,92,.12) inset}
.deck-card:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.deck-name{font-family:'Cinzel',serif;font-size:.88rem;font-weight:600;color:var(--text);margin-bottom:.35rem;line-height:1.2}
.deck-headliner{font-size:.8rem;color:var(--text2);font-style:italic;margin-bottom:.5rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-match-hint{font-size:.72rem;color:var(--gold);font-style:italic;margin-bottom:.35rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.deck-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.4rem}
.color-pips{display:flex;gap:3px}
.color-pip{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(255,255,255,.12);flex-shrink:0}
.pip-W{background:var(--mana-w)}.pip-U{background:var(--mana-u)}.pip-B{background:var(--mana-b)}.pip-R{background:var(--mana-r)}.pip-G{background:var(--mana-g)}
.deck-meta{display:flex;align-items:center;gap:.4rem}

/* variant ownership dots */
.var-dots{display:flex;gap:3px;align-items:center}
.var-dot{width:8px;height:8px;border-radius:50%;border:1px solid var(--border-hover);cursor:pointer;flex-shrink:0;transition:background .2s}
.var-dot.owned{background:var(--own-color);border-color:var(--own-color)}
.var-dot.unowned{background:transparent}

.has-list-badge{font-size:.62rem;padding:.12rem .4rem;border-radius:10px;background:rgba(201,168,76,.1);color:var(--gold);font-family:'Cinzel',serif;letter-spacing:.04em}
.no-list-badge{font-size:.62rem;padding:.12rem .4rem;border-radius:10px;background:rgba(255,255,255,.05);color:var(--text2);font-family:'Cinzel',serif}

/* ── Empty state ── */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--text2)}
.empty-state .glyph{font-size:2.5rem;margin-bottom:1rem;opacity:.5}
.empty-state h3{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--text);margin-bottom:.5rem}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.modal-overlay.open{display:flex;align-items:flex-end}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;display:flex;flex-direction:column;max-height:92vh;width:100%;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(min-width:768px){
  .modal-overlay{align-items:center;justify-content:center;padding:1.5rem}
  .modal{border-radius:14px;max-width:1000px;max-height:88vh}
}
.modal-header{align-items:flex-start;border-bottom:1px solid var(--border);display:flex;gap:.75rem;padding:1.1rem 1.4rem;flex-shrink:0}
.modal-header-info{flex:1;min-width:0}
.modal-title{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--gold);margin-bottom:.2rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.modal-headliner{color:var(--text2);font-style:italic;font-size:.9rem}
.modal-close{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);cursor:pointer;font-size:1rem;padding:.25rem .55rem;transition:color .2s,border-color .2s;flex-shrink:0}
.modal-close:hover{color:var(--text);border-color:var(--border-hover)}

/* variant tabs row */
.variant-row{border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;padding:0 1.4rem;flex-shrink:0;justify-content:space-between}
.variant-row::-webkit-scrollbar{display:none}
.variant-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.variant-tabs::-webkit-scrollbar{display:none}
.variant-tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--text2);cursor:pointer;font-family:'Cinzel',serif;font-size:.73rem;font-weight:600;letter-spacing:.04em;padding:.6rem .8rem;text-transform:uppercase;white-space:nowrap;transition:color .2s,border-color .2s;display:flex;align-items:center;gap:.35rem}
.variant-tab:hover{color:var(--text)}
.variant-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.variant-tab .vtab-own-dot{width:7px;height:7px;border-radius:50%;border:1px solid currentColor;transition:background .2s;flex-shrink:0}
.variant-tab.active .vtab-own-dot{border-color:var(--gold)}
.variant-tab .vtab-own-dot.owned{background:var(--own-color);border-color:var(--own-color)}

/* own toggle button */
.own-toggle-btn{flex-shrink:0;margin-left:.75rem;align-items:center;border:1px solid var(--border);border-radius:6px;cursor:pointer;display:inline-flex;font-family:'Cinzel',serif;font-size:.7rem;font-weight:600;gap:.35rem;letter-spacing:.04em;padding:.3rem .75rem;transition:all .2s;white-space:nowrap}
.own-toggle-btn.not-owned{background:none;color:var(--text2)}
.own-toggle-btn.not-owned:hover{border-color:var(--own-color);color:var(--own-color)}
.own-toggle-btn.is-owned{background:var(--own-glow);border-color:var(--own-color);color:var(--own-color)}
.own-toggle-btn .own-check{font-size:.9rem}

/* modal body */
.modal-body{display:flex;flex:1;overflow:hidden;flex-direction:column}
@media(min-width:640px){.modal-body{flex-direction:row}}

/* card list panel */
.card-list-panel{border-right:1px solid var(--border);flex-shrink:0;overflow-y:auto;padding:1.1rem 1.25rem;width:100%;max-height:40vh}
@media(min-width:640px){.card-list-panel{width:250px;max-height:none}}
.card-list-panel h4{color:var(--text2);font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.65rem}
.card-row{align-items:center;cursor:pointer;display:flex;gap:.55rem;padding:.25rem;border-radius:4px;transition:background .15s;margin:0 -.25rem}
.card-row:hover,.card-row.highlighted{background:rgba(201,168,76,.1)}
.card-qty{color:var(--text2);font-size:.82rem;min-width:16px;text-align:right;flex-shrink:0}
.card-name-list{color:var(--text);font-size:.92rem}
.card-row.land .card-name-list{color:var(--text2);font-style:italic}
.section-divider{border:none;border-top:1px solid var(--border);margin:.55rem 0}
.list-summary{color:var(--text2);font-size:.78rem;margin-top:.65rem;padding-top:.65rem;border-top:1px solid var(--border)}
.rarity-badge{font-family:'Cinzel',serif;font-size:.6rem;font-weight:700;letter-spacing:.05em;margin-left:auto;flex-shrink:0;padding:.05rem .28rem;border-radius:3px;opacity:.9}
.rarity-c{color:#888;background:rgba(136,136,136,.12)}
.rarity-u{color:#a8c4dc;background:rgba(168,196,220,.1)}
.rarity-r{color:var(--gold);background:rgba(201,168,76,.1)}
.rarity-m{color:#e5722e;background:rgba(229,114,46,.1)}
.rarity-s{color:#b070d0;background:rgba(176,112,208,.1)}
.tie-in-notice{background:rgba(201,168,76,.05);border:1px dashed var(--border);border-radius:6px;color:var(--text2);font-size:.8rem;padding:.55rem .75rem;margin-bottom:.5rem;font-style:italic}

/* images panel */
.card-images-panel{flex:1;overflow-y:auto;padding:1.1rem 1.25rem}
.card-images-panel h4{color:var(--text2);font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.65rem}
.card-images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.5rem}
.card-image-wrap{position:relative;cursor:pointer}
.card-image-wrap img{border-radius:6px;display:block;width:100%;aspect-ratio:5/7;object-fit:cover;background:var(--bg3);transition:transform .2s,box-shadow .2s,outline .15s}
.card-image-wrap:hover img{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 24px rgba(0,0,0,.6)}
.card-image-wrap.highlighted img{outline:2px solid var(--gold);outline-offset:1px}
.card-image-qty{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border-radius:50%;color:var(--gold);font-family:'Cinzel',serif;font-size:.68rem;font-weight:700;width:18px;height:18px;display:flex;align-items:center;justify-content:center}
.card-placeholder{aspect-ratio:5/7;background:var(--bg3);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:.4rem;text-align:center}
.card-placeholder span{color:var(--text2);font-size:.65rem;line-height:1.2}
.loading-spinner{display:flex;align-items:center;justify-content:center;padding:2rem;color:var(--text2);font-size:.88rem;gap:.55rem}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.no-list-notice{flex:1;padding:2rem;display:flex;align-items:center;justify-content:center}
.no-list-notice-inner{background:var(--bg3);border:1px dashed var(--border);border-radius:8px;padding:1.25rem;text-align:center;color:var(--text2);font-size:.88rem;max-width:360px}
.no-list-notice-inner a{color:var(--gold);text-decoration:none}
.no-list-notice-inner a:hover{text-decoration:underline}

/* footer */
.scryfall-credit{color:var(--text2);font-size:.72rem;padding:.45rem 1.4rem .75rem;border-top:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.scryfall-credit a{color:var(--gold);text-decoration:none}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <div class="site-logo">Jumpstart <span>Deck Browser</span></div>
    <div class="header-right">
      <button class="owned-btn" id="owned-only-btn" title="Show only decks you own">
        <span class="dot"></span>My Collection
      </button>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Deck or card name…" autocomplete="off" spellcheck="false">
        <span class="search-mode-badge" id="search-mode-badge" style="display:none">CARD</span>
      </div>
    </div>
  </div>
  <nav class="edition-tabs" role="tablist">
    <button class="tab active" data-edition="all">All Editions</button>
    <button class="tab" data-edition="jmp">Jumpstart (2020)</button>
    <button class="tab" data-edition="j22">Jumpstart 2022</button>
    <button class="tab" data-edition="j21">Historic Horizons</button>
    <button class="tab" data-edition="j25">Foundations (2024)</button>
    <button class="tab" data-edition="atj">Avatar (2025)</button>
    <button class="tab" data-edition="tie-ins">Set Tie-ins ↓</button>
  </nav>
</header>

<div class="filter-bar" role="toolbar">
  <span class="filter-label">Color</span>
  <button class="color-btn all active" data-c="all">All</button>
  <button class="color-btn" data-c="W"><span class="pip" style="background:var(--mana-w)"></span>White</button>
  <button class="color-btn" data-c="U"><span class="pip" style="background:var(--mana-u)"></span>Blue</button>
  <button class="color-btn" data-c="B"><span class="pip" style="background:var(--mana-b)"></span>Black</button>
  <button class="color-btn" data-c="R"><span class="pip" style="background:var(--mana-r)"></span>Red</button>
  <button class="color-btn" data-c="G"><span class="pip" style="background:var(--mana-g)"></span>Green</button>
  <button class="color-btn" data-c="M"><span class="pip" style="background:var(--mana-multi)"></span>Multi</button>
  <span class="results-count" id="results-count"></span>
</div>

<main id="main-content"></main>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" id="modal">
    <div class="modal-header" id="modal-header"></div>
    <div class="variant-row" id="variant-row" style="display:none">
      <div class="variant-tabs" id="variant-tabs"></div>
      <button class="own-toggle-btn not-owned" id="own-toggle-btn"></button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="scryfall-credit">
      <span>Card images via <a href="https://scryfall.com" target="_blank" rel="noopener">Scryfall</a></span>
      <span id="modal-edition-label"></span>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
// ─── OWNERSHIP (localStorage) ─────────────────────────────────────────────────
function loadOwned() {
  try { return new Set(JSON.parse(localStorage.getItem('jmp-owned') || '[]')); }
  catch { return new Set(); }
}
function saveOwned() {
  localStorage.setItem('jmp-owned', JSON.stringify([...state.owned]));
}
function ownedKey(deckId, vi) { return `${deckId}:${vi}`; }
function isVariantOwned(deckId, vi) { return state.owned.has(ownedKey(deckId, vi)); }
function isDeckOwned(deck) { return deck.variants.some((_, i) => isVariantOwned(deck.id, i)); }
function toggleOwned(deckId, vi) {
  const k = ownedKey(deckId, vi);
  state.owned.has(k) ? state.owned.delete(k) : state.owned.add(k);
  saveOwned();
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  edition: 'all', colors: new Set(), search: '',
  openDeckId: null, openEditionId: null, openVariant: 0,
  cardCache: {}, owned: loadOwned(), showOwnedOnly: false
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const COLOR_PIP = { W:'pip-W', U:'pip-U', B:'pip-B', R:'pip-R', G:'pip-G' };
const COLOR_NAME = { W:'White', U:'Blue', B:'Black', R:'Red', G:'Green' };
const BASIC_IMG = {
  Plains: 'https://cards.scryfall.io/normal/front/b/5/b5b8c2e5-8cbf-4ba3-842d-9d0c93308c4f.jpg',
  Island: 'https://cards.scryfall.io/normal/front/b/3/b3a6b9ba-c714-4f14-a7ae-cc3f8f70e00b.jpg',
  Swamp: 'https://cards.scryfall.io/normal/front/e/5/e5cb0f38-d6b6-4d6c-aee3-84df2f413d66.jpg',
  Mountain: 'https://cards.scryfall.io/normal/front/d/d/dd2b2e47-e5f1-4b87-bf4a-0c7b68c1a8cf.jpg',
  Forest: 'https://cards.scryfall.io/normal/front/4/c/4c72da84-4ef8-4cc4-9e8e-d4dbf9b4b9f3.jpg',
};

function hasCardList(deck) { return deck.variants.some(v => v.cards && v.cards.length > 0); }
function isMulti(deck) { return deck.colors.length > 1; }
function colorMatch(deck, set) {
  if (!set || set.size === 0) return true;
  if (set.has('M') && isMulti(deck)) return true;
  return deck.colors.some(c => set.has(c));
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Search: check deck name, headliner, AND all card names in all variants
function deckMatchesSearch(deck, q) {
  if (!q) return { match: true, type: null, matches: [] };
  const ql = q.toLowerCase();
  if (deck.name.toLowerCase().includes(ql)) return { match: true, type: 'name', matches: [] };
  if (deck.headliner && deck.headliner.toLowerCase().includes(ql)) return { match: true, type: 'name', matches: [] };
  const cardMatches = [];
  for (const v of deck.variants) {
    for (const c of (v.cards || [])) {
      if (!c.basic && c.name.toLowerCase().includes(ql) && !cardMatches.includes(c.name)) {
        cardMatches.push(c.name);
      }
    }
  }
  if (cardMatches.length > 0) return { match: true, type: 'card', matches: cardMatches };
  return { match: false, type: null, matches: [] };
}

// ─── RENDER GRID ──────────────────────────────────────────────────────────────
const TIE_IN_IDS = new Set(['jdmu','jbro','jone','jmom','jltr','jltr2']);

function getFilteredData() {
  const groups = [];
  let total = 0;
  for (const ed of DECK_DATA.editions) {
    const isTieIn = TIE_IN_IDS.has(ed.id);
    if (state.edition === 'tie-ins' && !isTieIn) continue;
    if (state.edition !== 'all' && state.edition !== 'tie-ins' && ed.id !== state.edition) continue;
    if (state.edition === 'all' && isTieIn) continue; // hide tie-ins from "all" unless selected
    const q = state.search;
    const filteredDecks = [];
    for (const deck of ed.decks) {
      if (!colorMatch(deck, state.colors)) continue;
      if (state.showOwnedOnly && !isDeckOwned(deck)) continue;
      const sr = deckMatchesSearch(deck, q);
      if (!sr.match) continue;
      filteredDecks.push({ deck, searchResult: sr });
    }
    if (filteredDecks.length > 0) { groups.push({ edition: ed, decks: filteredDecks }); total += filteredDecks.length; }
  }
  return { groups, total };
}

function renderGrid() {
  const main = document.getElementById('main-content');
  const { groups, total } = getFilteredData();
  const badge = document.getElementById('search-mode-badge');
  const isCardSearch = state.search && groups.some(g => g.decks.some(d => d.searchResult.type === 'card'));
  badge.style.display = isCardSearch ? 'flex' : 'none';
  document.getElementById('results-count').textContent = total > 0 ? `${total} deck${total !== 1 ? 's' : ''}` : '';

  if (total === 0) {
    main.innerHTML = `<div class="empty-state"><div class="glyph">🔮</div><h3>No decks found</h3><p>Try adjusting your filters or search term.</p></div>`;
    return;
  }

  let html = '';
  const showEdHead = state.edition === 'all' || groups.length > 1;
  for (const { edition, decks } of groups) {
    if (showEdHead) html += `<section class="edition-section"><h2 class="edition-heading">${esc(edition.name)} <em style="font-weight:400;font-size:.85em;color:var(--text2)">(${edition.year})</em></h2><div class="deck-grid">`;
    else html += `<section class="edition-section"><div class="deck-grid">`;

    for (const { deck, searchResult } of decks) {
      const pips = deck.colors.map(c => `<span class="color-pip ${COLOR_PIP[c]||''}" title="${COLOR_NAME[c]||c}"></span>`).join('');
      const owned = isDeckOwned(deck);
      const dots = deck.variants.map((_, i) => `<span class="var-dot ${isVariantOwned(deck.id, i) ? 'owned' : 'unowned'}" title="Variant ${i+1}${isVariantOwned(deck.id,i)?' – Owned':''}"></span>`).join('');
      const listBadge = hasCardList(deck) ? `<span class="has-list-badge">List ✓</span>` : `<span class="no-list-badge">No list</span>`;
      const matchHint = searchResult.type === 'card' && searchResult.matches.length > 0
        ? `<div class="card-match-hint">Contains: ${esc(searchResult.matches.slice(0,2).join(', '))}${searchResult.matches.length > 2 ? '…' : ''}</div>` : '';

      html += `<button class="deck-card${owned ? ' owned-card' : ''}" data-deck="${deck.id}" data-ed="${edition.id}" tabindex="0">
        <div class="deck-name">${esc(deck.name)}</div>
        ${deck.headliner ? `<div class="deck-headliner">${esc(deck.headliner)}</div>` : ''}
        ${matchHint}
        <div class="deck-footer">
          <div class="color-pips">${pips}</div>
          <div class="deck-meta">
            ${deck.variants.length > 1 ? `<div class="var-dots">${dots}</div>` : (owned ? `<div class="var-dots">${dots}</div>` : '')}
            ${listBadge}
          </div>
        </div>
      </button>`;
    }
    html += `</div></section>`;
  }
  main.innerHTML = html;

  main.querySelectorAll('.deck-card').forEach(btn => {
    btn.addEventListener('click', () => openDeck(btn.dataset.deck, btn.dataset.ed));
  });
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openDeck(deckId, editionId) {
  const ed = DECK_DATA.editions.find(e => e.id === editionId);
  const deck = ed && ed.decks.find(d => d.id === deckId);
  if (!deck) return;
  state.openDeckId = deckId; state.openEditionId = editionId; state.openVariant = 0;
  renderModal(deck, ed);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  state.openDeckId = null;
}

function renderModal(deck, ed) {
  const vi = state.openVariant;
  const variant = deck.variants[vi];
  const pips = deck.colors.map(c => `<span class="color-pip ${COLOR_PIP[c]||''}" style="width:17px;height:17px" title="${COLOR_NAME[c]||c}"></span>`).join('');

  // Header
  document.getElementById('modal-header').innerHTML = `
    <div class="modal-header-info">
      <div class="modal-title">${esc(deck.name)}<span style="display:flex;gap:3px">${pips}</span></div>
      ${deck.headliner ? `<div class="modal-headliner">${esc(deck.headliner)}</div>` : ''}
    </div>
    <button class="modal-close" id="modal-close-btn">✕</button>`;
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('modal-edition-label').textContent = `${ed.name} · ${ed.year}`;

  // Variant row
  const varRow = document.getElementById('variant-row');
  const vtabs = document.getElementById('variant-tabs');
  if (deck.variants.length > 1) {
    varRow.style.display = 'flex';
    vtabs.innerHTML = deck.variants.map((v, i) => {
      const owned = isVariantOwned(deck.id, i);
      return `<button class="variant-tab${i === vi ? ' active' : ''}" data-vi="${i}">
        <span class="vtab-own-dot${owned ? ' owned' : ''}"></span>${esc(v.label)}
      </button>`;
    }).join('');
    vtabs.querySelectorAll('.variant-tab').forEach(t => {
      t.addEventListener('click', () => { state.openVariant = parseInt(t.dataset.vi); renderModal(deck, ed); });
    });
  } else {
    varRow.style.display = deck.variants.length === 1 ? 'flex' : 'none';
    vtabs.innerHTML = '';
  }

  // Own toggle button
  const ownBtn = document.getElementById('own-toggle-btn');
  const ownedNow = isVariantOwned(deck.id, vi);
  ownBtn.className = `own-toggle-btn ${ownedNow ? 'is-owned' : 'not-owned'}`;
  ownBtn.innerHTML = ownedNow
    ? `<span class="own-check">✓</span> Owned`
    : `<span class="own-check">○</span> Mark Owned`;
  ownBtn.onclick = () => {
    toggleOwned(deck.id, vi);
    renderModal(deck, ed);
    renderGrid();
  };

  // Body
  const body = document.getElementById('modal-body');
  if (!variant.cards || variant.cards.length === 0) {
    body.innerHTML = `<div class="no-list-notice"><div class="no-list-notice-inner">
      <p style="font-size:1rem;color:var(--text);margin-bottom:.5rem">No card list yet</p>
      <p>Help add it on <a href="https://github.com/your-repo/jumpstart-browser" target="_blank" rel="noopener">GitHub →</a></p>
    </div></div>`;
    return;
  }

  const lands = variant.cards.filter(c => c.basic);
  const spells = variant.cards.filter(c => !c.basic);
  const total = variant.cards.reduce((s, c) => s + c.qty, 0);

  // Tie-in edition notice (random rare slot)
  const edObj = DECK_DATA.editions.find(e => e.id === state.openEditionId);
  const tieInNote = edObj?.note ? `<div class="tie-in-notice">⚠ ${esc(edObj.note)}</div>` : '';

  let listHtml = `${tieInNote}<h4>Card List (${total})</h4>`;
  spells.forEach(c => { listHtml += `<div class="card-row" data-card="${esc(c.name)}"><span class="card-qty">${c.qty}×</span><span class="card-name-list">${esc(c.name)}</span></div>`; });
  if (lands.length) {
    listHtml += `<hr class="section-divider">`;
    lands.forEach(c => { listHtml += `<div class="card-row land" data-card="${esc(c.name)}"><span class="card-qty">${c.qty}×</span><span class="card-name-list">${esc(c.name)}</span></div>`; });
  }
  listHtml += `<div class="list-summary">${total} cards · ${spells.length} spells · ${lands.reduce((s,c)=>s+c.qty,0)} lands</div>`;

  body.innerHTML = `
    <div class="card-list-panel" id="card-list-panel">${listHtml}</div>
    <div class="card-images-panel" id="card-images-panel"><h4>Card Images</h4><div class="loading-spinner"><div class="spinner"></div>Loading…</div></div>`;

  // Highlight on click
  let highlighted = null;
  body.querySelectorAll('.card-row').forEach(row => {
    row.addEventListener('click', () => {
      if (highlighted) highlighted.classList.remove('highlighted');
      if (highlighted === row) { highlighted = null; return; }
      row.classList.add('highlighted'); highlighted = row;
      highlightImg(row.dataset.card);
    });
  });

  fetchImages(deck, variant);
}

let fetchCtrl = null;
async function fetchImages(deck, variant) {
  const panel = document.getElementById('card-images-panel');
  if (!panel) return;
  if (fetchCtrl) fetchCtrl.abort();
  fetchCtrl = new AbortController();
  const signal = fetchCtrl.signal;

  const key = `${deck.id}:${state.openVariant}`;
  if (state.cardCache[key]) { renderImages(panel, variant, state.cardCache[key]); return; }

  const names = [...new Set(variant.cards.filter(c => !c.basic).map(c => c.name))];
  if (!names.length) { renderImages(panel, variant, {}); return; }

  try {
    const r = await fetch('https://api.scryfall.com/cards/collection', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ identifiers: names.map(n => ({ name: n })) }), signal
    });
    if (!r.ok) throw new Error();
    const d = await r.json();
    const map = {};
    for (const card of (d.data || [])) {
      const img = card.image_uris?.normal || card.card_faces?.[0]?.image_uris?.normal || null;
      if (img) map[card.name] = { img, url: card.scryfall_uri, rarity: card.rarity || 'common' };
    }
    state.cardCache[key] = map;
    if (!signal.aborted) renderImages(panel, variant, map);
  } catch(e) {
    if (!signal?.aborted) renderImages(panel, variant, {});
  }
}

const RARITY_ABBR = { common:'C', uncommon:'U', rare:'R', mythic:'M', special:'S', bonus:'S' };
const RARITY_CLS  = { common:'rarity-c', uncommon:'rarity-u', rare:'rarity-r', mythic:'rarity-m', special:'rarity-s', bonus:'rarity-s' };

function renderImages(panel, variant, map) {
  if (!panel || !panel.isConnected) return;
  const order = [...variant.cards.filter(c => !c.basic), ...variant.cards.filter(c => c.basic)];
  let html = `<h4>Card Images</h4><div class="card-images-grid">`;
  for (const card of order) {
    const info = card.basic ? null : map[card.name];
    const src = card.basic ? (BASIC_IMG[card.name] || '') : (info?.img || '');
    const url = info?.url || '';
    const inner = src
      ? `<img src="${esc(src)}" alt="${esc(card.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'card-placeholder\\'><span>${esc(card.name)}</span></div>'">`
      : `<div class="card-placeholder"><span>${esc(card.name)}</span></div>`;
    html += `<div class="card-image-wrap" data-img-card="${esc(card.name)}" ${url ? `onclick="window.open('${esc(url)}','_blank')"` : ''}>
      ${inner}${card.qty > 1 ? `<span class="card-image-qty">${card.qty}</span>` : ''}
    </div>`;
  }
  html += `</div>`;
  panel.innerHTML = html;

  // Update card list rarities now that we have Scryfall data
  const listPanel = document.getElementById('card-list-panel');
  if (listPanel) {
    listPanel.querySelectorAll('.card-row[data-card]').forEach(row => {
      const name = row.dataset.card;
      const info = map[name];
      if (info?.rarity) {
        const existing = row.querySelector('.rarity-badge');
        if (existing) existing.remove();
        const badge = document.createElement('span');
        badge.className = `rarity-badge ${RARITY_CLS[info.rarity] || 'rarity-c'}`;
        badge.textContent = RARITY_ABBR[info.rarity] || info.rarity[0].toUpperCase();
        badge.title = info.rarity.charAt(0).toUpperCase() + info.rarity.slice(1);
        row.appendChild(badge);
      }
    });
  }
}

function highlightImg(name) {
  const panel = document.getElementById('card-images-panel');
  if (!panel) return;
  panel.querySelectorAll('.card-image-wrap').forEach(el => el.classList.remove('highlighted'));
  const t = panel.querySelector(`[data-img-card="${CSS.escape(name)}"]`);
  if (t) { t.classList.add('highlighted'); t.scrollIntoView({ block:'nearest', behavior:'smooth' }); }
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.edition = t.dataset.edition;
    renderGrid();
  });
});

document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const c = btn.dataset.c;
    if (c === 'all') {
      state.colors.clear();
      document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    } else {
      document.querySelector('.color-btn.all').classList.remove('active');
      state.colors.has(c) ? state.colors.delete(c) : state.colors.add(c);
      btn.classList.toggle('active', state.colors.has(c));
      if (state.colors.size === 0) document.querySelector('.color-btn.all').classList.add('active');
    }
    renderGrid();
  });
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.search = e.target.value.trim(); renderGrid(); }, 180);
});

document.getElementById('owned-only-btn').addEventListener('click', () => {
  state.showOwnedOnly = !state.showOwnedOnly;
  document.getElementById('owned-only-btn').classList.toggle('active', state.showOwnedOnly);
  renderGrid();
});

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault(); document.getElementById('search-input').focus();
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderGrid();
</script>
</body>
</html>
